<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Required — Zero Trust Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { 
            background: #0a0e17; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; max-width: 480px; width: 100%;
        }
        .lock-icon { 
            font-size: 3.5rem; color: #f59e0b;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .btn-zt { 
            background: linear-gradient(135deg, #0d6efd, #0a58ca); border: none;
            padding: 12px 32px; font-weight: 600;
        }
        .btn-zt:hover { box-shadow: 0 4px 20px rgba(13,110,253,0.4); }
    </style>
</head>
<body>
    <div class="auth-card p-5 text-center">
        <div class="lock-icon mb-4">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h2 class="fw-bold mb-2">Authentication Required</h2>
        <p class="text-secondary mb-4">
            This resource is protected by Zero Trust policy.<br>
            Please authenticate via Keycloak to continue.
        </p>

        {% if error %}
        <div class="alert alert-danger d-flex align-items-center mb-4 text-start" role="alert" style="font-size: 0.85rem;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <div>{{ error }}</div>
        </div>
        {% endif %}

        <a href="/login" class="btn btn-zt btn-lg text-white mb-3 w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In with Keycloak
        </a>
        <a href="/" class="btn btn-outline-secondary w-100">
            <i class="bi bi-house me-2"></i>Return Home
        </a>

        <div class="mt-4 pt-3 border-top border-secondary border-opacity-10">
            <p class="text-secondary small mb-0">
                <i class="bi bi-info-circle me-1"></i>
                Zero Trust: Every request must be authenticated and authorized.
            </p>
        </div>
    </div>
</body>
</html>
