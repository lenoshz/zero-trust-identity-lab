# ═══════════════════════════════════════════════════════════════
# Zero Trust Identity & Secrets Management Lab
# Docker Compose v2 — single-command deployment
# ═══════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL — Keycloak persistent store
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - identity-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Keycloak — Identity Provider (OIDC / SSO / RBAC)
  # ─────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: zt-keycloak
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}

      # Keycloak 24+ style
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}

      # Backward-compatible fallback
      KEYCLOAK_ADMIN: ${KC_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}

      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_LOG: console

      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_URL: https://localhost/auth
      KC_HOSTNAME_ADMIN_URL: https://localhost/auth

      KC_SPI_EVENTS_LISTENER_JBOSS_LOGGING_SUCCESS_LEVEL: info
      KC_SPI_EVENTS_LISTENER_JBOSS_LOGGING_ERROR_LEVEL: warn
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_logs:/var/log/keycloak
    ports:
      - "8080:8080"
    networks:
      - identity-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c \"exec 3<>/dev/tcp/localhost/8080 && printf 'GET /auth/realms/master HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'\""]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 180s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # OpenBao — Secrets Management (dev mode)
  # ─────────────────────────────────────────────────────────────
  openbao:
    image: openbao/openbao:2.0.0
    container_name: zt-openbao
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${OPENBAO_DEV_ROOT_TOKEN_ID}
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      BAO_ADDR: "http://127.0.0.1:8200"
    command: server -dev
    ports:
      - "8200:8200"
    volumes:
      - openbao_data:/bao/data
    networks:
      - identity-net
    healthcheck:
      test: ["CMD", "bao", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Flask Demo App — Zero Trust protected application
  # ─────────────────────────────────────────────────────────────
  flask-app:
    build:
      context: ./flask-app
      dockerfile: Dockerfile
    container_name: zt-flask-app
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      FLASK_KEYCLOAK_CLIENT_ID: ${FLASK_KEYCLOAK_CLIENT_ID}
      FLASK_KEYCLOAK_CLIENT_SECRET: ${FLASK_KEYCLOAK_CLIENT_SECRET}
      FLASK_KEYCLOAK_REALM: zero-trust-realm
      FLASK_KEYCLOAK_BASE_URL: http://keycloak:8080/auth
      FLASK_OIDC_REDIRECT_URI: https://localhost/app/callback
      FLASK_OPENBAO_ADDR: ${FLASK_OPENBAO_ADDR}
      FLASK_OPENBAO_TOKEN: ${FLASK_OPENBAO_TOKEN}
      DOMAIN: ${DOMAIN}
    ports:
      - "5000:5000"
    networks:
      - identity-net
    depends_on:
      keycloak:
        condition: service_started
      openbao:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Nginx — TLS reverse proxy & Zero Trust enforcement layer
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: zt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - identity-net
      - monitoring-net
    depends_on:
      keycloak:
        condition: service_started
      flask-app:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Elasticsearch — Log storage and search engine
  # ─────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: zt-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.license.self_generated.type=basic
      - cluster.name=zerotrust-cluster
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elk/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Kibana — Visualization & SIEM dashboards
  # ─────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: zt-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - SERVER_BASEPATH=/kibana
      - SERVER_REWRITEBASEPATH=true
      - XPACK_SECURITY_ENABLED=true
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    networks:
      - monitoring-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/kibana/api/status | grep -q '\"level\":\"available\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Filebeat — Log shipper (Keycloak + Nginx → Elasticsearch)
  # ─────────────────────────────────────────────────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    container_name: zt-filebeat
    user: root
    command: filebeat -e --strict.perms=false
    volumes:
      - ./elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - keycloak_logs:/var/log/keycloak:ro
      - nginx_logs:/var/log/nginx:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    networks:
      - monitoring-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

# ═══════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════
networks:
  identity-net:
    name: identity-net
    driver: bridge
  monitoring-net:
    name: monitoring-net
    driver: bridge

# ═══════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════
volumes:
  postgres_data:
  openbao_data:
  elasticsearch_data:
  keycloak_logs:
  nginx_logs: