# ═══════════════════════════════════════════════════════════════
# Nginx — Zero Trust TLS Reverse Proxy
# JSON access logs · Security headers · Upstream proxying
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── JSON access log format (Filebeat-friendly) ──
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"request_time":$request_time,'
            '"server_name":"$server_name"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    keepalive_timeout 65;
    resolver 127.0.0.11 valid=10s ipv6=off;
    proxy_buffer_size 32k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;
    large_client_header_buffers 8 32k;

    # ── Upstream definitions ──
    upstream keycloak_backend {
        server keycloak:8080;
    }

    upstream flask_backend {
        server flask-app:5000;
    }

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──
    server {
        listen 443 ssl;
        server_name _;

        # ── TLS configuration ──
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Zero Trust security headers ──
        add_header X-Frame-Options          "SAMEORIGIN"          always;
        add_header X-Content-Type-Options   "nosniff"             always;
        add_header X-XSS-Protection         "1; mode=block"       always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy   "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval';" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── Custom error pages ──
        error_page 403 /custom_403.html;
        error_page 502 /custom_502.html;

        location = /custom_403.html {
            internal;
            default_type text/html;
            return 403 '<!DOCTYPE html><html><head><title>403 Forbidden</title><style>body{font-family:system-ui,-apple-system,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#0f172a;color:#e2e8f0}div{text-align:center;padding:2rem;border:1px solid #334155;border-radius:12px;background:#1e293b}.code{font-size:4rem;font-weight:700;color:#ef4444}.msg{margin-top:1rem;color:#94a3b8}a{color:#3b82f6;text-decoration:none}</style></head><body><div><div class="code">403</div><h2>Access Denied</h2><p class="msg">Zero Trust Policy: You do not have permission to access this resource.</p><p><a href="/">Return Home</a></p></div></body></html>';
        }

        location = /custom_502.html {
            internal;
            default_type text/html;
            return 502 '<!DOCTYPE html><html><head><title>502 Bad Gateway</title><style>body{font-family:system-ui,-apple-system,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#0f172a;color:#e2e8f0}div{text-align:center;padding:2rem;border:1px solid #334155;border-radius:12px;background:#1e293b}.code{font-size:4rem;font-weight:700;color:#f59e0b}.msg{margin-top:1rem;color:#94a3b8}a{color:#3b82f6;text-decoration:none}</style></head><body><div><div class="code">502</div><h2>Service Unavailable</h2><p class="msg">The upstream service is temporarily unavailable. Please try again.</p><p><a href="/">Return Home</a></p></div></body></html>';
        }

        # ── Keycloak proxy ──
        location /auth/ {
            proxy_pass http://keycloak_backend;
            proxy_set_header Host               $host;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-Host   $host;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Port   $server_port;
        }

        # ── Flask app proxy ──
        location /app/ {
            proxy_pass http://flask_backend/;
            proxy_set_header Host               $host;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-Host   $host;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Port   $server_port;
        }

        # ── Kibana proxy ──
        location /kibana/ {
            # Resolve Kibana dynamically so nginx can still start if DNS is temporarily unavailable.
            set $kibana_host kibana;
            proxy_pass http://$kibana_host:5601/kibana/;
            proxy_set_header Host               $host;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-Host   $host;
            proxy_set_header X-Forwarded-Port   $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade            $http_upgrade;
            proxy_set_header Connection         "upgrade";
        }

        # ── Root redirect ──
        location = / {
            return 302 /app/;
        }
    }
}
